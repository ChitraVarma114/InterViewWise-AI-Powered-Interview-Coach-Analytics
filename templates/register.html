{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-box">
    <h2>Register</h2>
    <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">
        <input type="text" name="username" placeholder="Full Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="password" name="confirm_password" placeholder="Confirm Password" required />

        <select name="role" required>
            <option disabled selected>Select Role</option>
            <option>Software Engineer</option>
            <option>Data Analyst</option>
            <option>Data Scientist</option>
            <option>HR</option>
            <option>Project Manager</option>
            <option>QA Engineer</option>
            <option>Marketing</option>
            <option>Intern</option>
            <option>Support</option>
            <option>Other</option>
        </select>

        <select name="graduation" required>
            <option disabled selected>Graduation Level</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
            <option>PhD</option>
            <option>Diploma</option>
            <option>Other</option>
        </select>

        <input type="url" name="linkedin" placeholder="LinkedIn Profile (optional)" />
        <input type="file" name="resume" accept=".pdf,.doc,.docx" />
        <input type="file" name="cover_letter" accept=".pdf,.doc,.docx" />

        <button class="button" type="submit">Register</button>

        <div class="back-link">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </form>
</div>
{% endblock %}
