{% extends "base.html" %}
{% block title %}Quiz Result{% endblock %}
{% block content %}
<div class="card">
    <h2>✅ Quiz Submitted</h2>
    <p><strong>Your Score:</strong> {{ score }} / {{ total }}</p>
    <a class="button" href="{{ url_for('quiz') }}">Take Again</a>
    <a class="button" href="{{ url_for('profile') }}" style="margin-left:8px;">Go to Profile</a>
</div>
{% endblock %}
